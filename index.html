<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RushB TeamFinder</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0b0f14;
    color: white;
    overflow: hidden;
  }

  .topbar {
    padding: 14px;
    background: #111823;
    text-align: center;
    color: #7CFF6B;
    font-weight: bold;
  }

  .login {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  input, select {
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #1a2433;
    color: white;
  }

  button {
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #7CFF6B;
    font-weight: bold;
    cursor: pointer;
  }

  .container {
    display: none;
    padding: 15px;
  }

  .banner {
    background: #121a26;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    color: #7CFF6B;
    margin-bottom: 15px;
  }

  .card {
    background: #121a26;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .role { color: #7CFF6B; font-size: 12px; }
  .nick { font-size: 18px; font-weight: bold; }
  .meta { font-size: 12px; opacity: 0.8; }

  .meme {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: -80px;
    background: #111823;
    color: #7CFF6B;
    padding: 10px 15px;
    border-radius: 10px;
    font-weight: bold;
    animation: up 4s ease forwards;
    z-index: 999;
  }

  @keyframes up {
    0% { bottom: -80px; opacity: 0; }
    15% { opacity: 1; }
    100% { bottom: 100%; opacity: 0; }
  }
</style>
</head>

<body>

<div class="topbar">RUSHB TEAMFINDER</div>

<div class="login" id="loginBox">

  <input id="nick" placeholder="Ник"/>

  <select id="type" onchange="buildRanks()">
    <option value="mm">MM</option>
    <option value="faceit">FACEIT</option>
    <option value="premier">PREMIER</option>
  </select>

  <select id="rank"></select>

  <button onclick="login()">Войти</button>

</div>

<div class="container" id="main">

  <div class="banner">RUSH B NO STOP</div>

  <button onclick="addPlayer()">Ищу тиммейтов</button>

  <div id="list"></div>

</div>

<script>

const memes = [
  "Rush B no stop!",
  "It's Jame time!",
  "CYKA BLYAT!",
  "1v5 EZ",
  "NO INFO???"
];

const ranks = {
  mm: [
    "Silver I","Silver II","Silver III","Silver IV",
    "Gold Nova I","Gold Nova II","Gold Nova III","Gold Nova Master",
    "MG","DMG","Global"
  ],
  faceit: [
    "Level 1","Level 2","Level 3","Level 4","Level 5",
    "Level 6","Level 7","Level 8","Level 9","Level 10"
  ],
  premier: [
    "0-5k","5k-10k","10k-15k",
    "15k-20k","20k-25k","25k+"
  ]
};

let players = [];

function buildRanks() {
  const type = document.getElementById("type").value;
  const rankSelect = document.getElementById("rank");

  // ВАЖНО: полностью очищаем
  rankSelect.innerHTML = "";

  // пересобираем заново
  ranks[type].forEach(r => {
    const opt = document.createElement("option");
    opt.value = r;
    opt.textContent = r;
    rankSelect.appendChild(opt);
  });
}

// запускаем сразу при загрузке
buildRanks();

function login() {
  const nick = document.getElementById("nick").value;
  if (!nick) return;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("main").style.display = "block";

  startMemes();
}

function addPlayer() {
  const nick = document.getElementById("nick").value;
  const type = document.getElementById("type").value;
  const rank = document.getElementById("rank").value;

  players.push({ nick, type, rank });

  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  players.forEach(p => {

    const label =
      p.type === "faceit" ? "FACEIT" :
      p.type === "premier" ? "Premier" :
      "MM";

    list.innerHTML += `
      <div class="card">
        <div class="role">RIFLER</div>
        <div class="nick">${p.nick}</div>
        <div class="meta">${label}: ${p.rank}</div>
      </div>
    `;
  });
}

function spawnMeme() {
  const m = document.createElement("div");
  m.className = "meme";
  m.textContent = memes[Math.floor(Math.random()*memes.length)];

  document.body.appendChild(m);

  setTimeout(() => m.remove(), 4000);
}

function startMemes() {
  spawnMeme();
  setInterval(spawnMeme, 5000);
}

</script>

</body>
</html>
