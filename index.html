<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RushB TeamFinder</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #e6e6e6;
      overflow: hidden;
    }

    .topbar {
      padding: 14px;
      background: #111823;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
      color: #7CFF6B;
    }

    .login {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, select {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1a2433;
      color: white;
      outline: none;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #7CFF6B;
      font-weight: bold;
      cursor: pointer;
    }

    .container {
      display: none;
      padding: 15px;
    }

    .banner {
      background: #121a26;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      color: #7CFF6B;
      font-weight: bold;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn-green {
      flex: 1;
      background: #7CFF6B;
      color: #000;
    }

    .card {
      background: #121a26;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .role {
      color: #7CFF6B;
      font-size: 12px;
    }

    .nick {
      font-size: 18px;
      font-weight: bold;
    }

    .meta {
      font-size: 12px;
      opacity: 0.8;
    }

    .meme {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: -80px;
      background: #111823;
      color: #7CFF6B;
      padding: 10px 15px;
      border-radius: 10px;
      font-weight: bold;
      animation: floatUp 4s ease forwards;
      z-index: 999;
    }

    @keyframes floatUp {
      0% { bottom: -80px; opacity: 0; }
      15% { opacity: 1; }
      100% { bottom: 100%; opacity: 0; }
    }
  </style>
</head>

<body>

<div class="topbar">RUSHB TEAMFINDER</div>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h3>Войти по нику</h3>

  <input id="nickInput" placeholder="Введите ник..." />

  <select id="rankType" onchange="updateRanks()">
    <option value="mm">MM (звания)</option>
    <option value="faceit">FACEIT</option>
    <option value="premier">Premier (CS2)</option>
  </select>

  <select id="rankValue"></select>

  <button onclick="login()">Войти</button>
</div>

<!-- MAIN -->
<div class="container" id="main">

  <div class="banner">RUSH B NO STOP</div>

  <div class="actions">
    <button class="btn-green" onclick="addMe()">Ищу тиммейтов</button>
  </div>

  <div id="list"></div>
</div>

<script>
let userNick = "";
let userRankType = "";
let userRankValue = "";

const memes = [
  "Rush B no stop!",
  "It's Jame time!",
  "Why you bully me?",
  "CYKA BLYAT MOMENT",
  "1v5? EASY",
  "NO INFO?? GG"
];

const players = [];

/* РАНГИ */
const ranks = {
  mm: [
    "Silver I","Silver II","Silver III","Silver IV",
    "Gold Nova I","Gold Nova II","Gold Nova III","Gold Nova Master",
    "Master Guardian","DMG","Global Elite"
  ],
  faceit: [
    "Level 1","Level 2","Level 3","Level 4","Level 5",
    "Level 6","Level 7","Level 8","Level 9","Level 10"
  ],
  premier: [
    "0 - 4,999","5,000 - 9,999","10,000 - 14,999",
    "15,000 - 19,999","20,000 - 24,999","25,000+"
  ]
};

/* обновление списка рангов */
function updateRanks() {
  const type = document.getElementById("rankType").value;
  const rankSelect = document.getElementById("rankValue");

  rankSelect.innerHTML = "";

  ranks[type].forEach(r => {
    const opt = document.createElement("option");
    opt.value = r;
    opt.textContent = r;
    rankSelect.appendChild(opt);
  });
}

/* init */
updateRanks();

function login() {
  const nick = document.getElementById("nickInput").value;
  if (!nick) return;

  userNick = nick;
  userRankType = document.getElementById("rankType").value;
  userRankValue = document.getElementById("rankValue").value;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("main").style.display = "block";

  startMemeSystem();
}

function addMe() {
  players.push({
    nick: userNick,
    role: "RIFLER",
    rankType: userRankType,
    rank: userRankValue
  });

  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  players.forEach(p => {

    let label =
      p.rankType === "premier" ? "Premier Rating" :
      p.rankType === "faceit" ? "FACEIT Level" :
      "MM Rank";

    list.innerHTML += `
      <div class="card">
        <div class="role">${p.role}</div>
        <div class="nick">${p.nick}</div>
        <div class="meta">${label}: ${p.rank}</div>
      </div>
    `;
  });
}

function spawnMeme() {
  const meme = document.createElement("div");
  meme.className = "meme";
  meme.innerText = memes[Math.floor(Math.random() * memes.length)];

  document.body.appendChild(meme);

  setTimeout(() => meme.remove(), 4000);
}

function startMemeSystem() {
  spawnMeme();
  setInterval(spawnMeme, 5000);
}
</script>

</body>
</html>
