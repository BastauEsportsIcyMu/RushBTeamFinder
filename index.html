<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RushB TeamFinder</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #e6e6e6;
    }

    /* TOP BAR */
    .topbar {
      padding: 14px;
      background: #111823;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
      color: #7CFF6B;
    }

    /* LOGIN */
    .login {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1a2433;
      color: white;
      outline: none;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #7CFF6B;
      font-weight: bold;
      cursor: pointer;
    }

    /* MAIN */
    .container {
      display: none;
      padding: 15px;
    }

    .banner {
      background: #121a26;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      color: #7CFF6B;
      font-weight: bold;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn-dark {
      flex: 1;
      background: #1a2433;
      color: white;
    }

    .btn-green {
      flex: 1;
      background: #7CFF6B;
      color: #000;
    }

    /* PLAYER CARD */
    .card {
      background: #121a26;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .role {
      color: #7CFF6B;
      font-size: 12px;
    }

    .nick {
      font-size: 18px;
      font-weight: bold;
    }

    .meta {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div class="topbar">RUSHB TEAMFINDER</div>

  <!-- LOGIN -->
  <div class="login" id="loginBox">
    <h3>Войти по нику</h3>
    <input id="nickInput" placeholder="Введите ник..." />
    <button onclick="login()">Войти</button>
  </div>

  <!-- MAIN -->
  <div class="container" id="main">

    <div class="banner" id="banner">
      RUSH B NO STOP
    </div>

    <div class="actions">
      <button class="btn-green" onclick="addMe()">Ищу тиммейтов</button>
      <button class="btn-dark" onclick="randomMeme()">Мем</button>
    </div>

    <div id="list"></div>
  </div>

<script>
  let userNick = "";

  const memes = [
    "What is your max elo? tell me,tell me",
    "Why you bully me?",
    "This is not FPL,this is a major!",
    "It's Jame time!",
    "Rush b suka blyat!"
  ];

  const players = [];

  function login() {
    const nick = document.getElementById("nickInput").value;
    if (!nick) return;

    userNick = nick;
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("main").style.display = "block";
  }

  function addMe() {
    players.push({
      nick: userNick,
      role: "RIFLER",
      rank: "FACEIT 8",
      kd: (Math.random() * 1.5 + 0.5).toFixed(2)
    });

    render();
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    players.forEach(p => {
      list.innerHTML += `
        <div class="card">
          <div class="role">${p.role}</div>
          <div class="nick">${p.nick}</div>
          <div class="meta">Rank: ${p.rank} | K/D: ${p.kd}</div>
        </div>
      `;
    });
  }

  function randomMeme() {
    document.getElementById("banner").innerText =
      memes[Math.floor(Math.random() * memes.length)];
  }
</script>

</body>
</html>
