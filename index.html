<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RushB TeamFinder</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #e6e6e6;
      overflow: hidden;
    }

    .topbar {
      padding: 14px;
      background: #111823;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
      color: #7CFF6B;
    }

    .login {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, select {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #1a2433;
      color: white;
      outline: none;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #7CFF6B;
      font-weight: bold;
      cursor: pointer;
    }

    .container {
      display: none;
      padding: 15px;
    }

    .banner {
      background: #121a26;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      color: #7CFF6B;
      font-weight: bold;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn-green {
      flex: 1;
      background: #7CFF6B;
      color: #000;
    }

    .card {
      background: #121a26;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .role {
      color: #7CFF6B;
      font-size: 12px;
    }

    .nick {
      font-size: 18px;
      font-weight: bold;
    }

    .meta {
      font-size: 12px;
      opacity: 0.8;
    }

    /* 💬 MEMES */
    .meme {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: -80px;
      background: #111823;
      color: #7CFF6B;
      padding: 10px 15px;
      border-radius: 10px;
      font-weight: bold;
      box-shadow: 0 0 15px rgba(124,255,107,0.2);
      animation: floatUp 4s ease forwards;
      z-index: 999;
    }

    @keyframes floatUp {
      0% {
        bottom: -80px;
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        bottom: 100%;
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="topbar">RUSHB TEAMFINDER</div>

  <!-- LOGIN -->
  <div class="login" id="loginBox">
    <h3>Войти по нику</h3>

    <input id="nickInput" placeholder="Введите ник..." />

    <select id="rankType">
      <option value="premier">Premier (CS2)</option>
      <option value="faceit">FACEIT</option>
      <option value="mm">MM (звания)</option>
    </select>

    <select id="rankValue">
      <option>Silver I</option>
      <option>Silver II</option>
      <option>Silver III</option>
      <option>Gold Nova I</option>
      <option>Gold Nova IV</option>
      <option>Master Guardian</option>
      <option>DMG</option>
      <option>Global Elite</option>
    </select>

    <button onclick="login()">Войти</button>
  </div>

  <!-- MAIN -->
  <div class="container" id="main">

    <div class="banner">
      RUSH B NO STOP
    </div>

    <div class="actions">
      <button class="btn-green" onclick="addMe()">Ищу тиммейтов</button>
    </div>

    <div id="list"></div>
  </div>

<script>
  let userNick = "";
  let userRankType = "";
  let userRankValue = "";

  const memes = [
    "Rush B no stop",
    "It's Jame time!",
    "Why you bully me?",
    "CYKA BLYAT RUSH B NAHUY",
    "I GO MID EVERY ROUND SUKA",
    "Two B,four A"
  ];

  const players = [];

  function login() {
    const nick = document.getElementById("nickInput").value;
    if (!nick) return;

    userNick = nick;
    userRankType = document.getElementById("rankType").value;
    userRankValue = document.getElementById("rankValue").value;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("main").style.display = "block";

    startMemeSystem();
  }

  function addMe() {
    players.push({
      nick: userNick,
      role: "RIFLER",
      rankType: userRankType,
      rank: userRankValue
    });

    render();
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    players.forEach(p => {
      let rankLabel = "";

      if (p.rankType === "premier") {
        rankLabel = "Premier Rank";
      } else if (p.rankType === "faceit") {
        rankLabel = "FACEIT Level";
      } else {
        rankLabel = "MM Rank";
      }

      list.innerHTML += `
        <div class="card">
          <div class="role">${p.role}</div>
          <div class="nick">${p.nick}</div>
          <div class="meta">${rankLabel}: ${p.rank}</div>
        </div>
      `;
    });
  }

  function spawnMeme() {
    const meme = document.createElement("div");
    meme.className = "meme";
    meme.innerText = memes[Math.floor(Math.random() * memes.length)];

    document.body.appendChild(meme);

    setTimeout(() => {
      meme.remove();
    }, 4000);
  }

  function startMemeSystem() {
    spawnMeme();
    setInterval(spawnMeme, 5000);
  }
</script>

</body>
</html>
